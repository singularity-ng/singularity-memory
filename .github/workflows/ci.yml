name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ghcr.io/tensorchord/vchord-suite:pg18-latest
        env:
          POSTGRES_USER: operations_memory
          POSTGRES_PASSWORD: password
          POSTGRES_DB: operations_memory_test
        options: >-
          --health-cmd "pg_isready -U operations_memory -d operations_memory_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Go build
        run: go build ./...
      - name: Go test
        run: go test ./...
        env:
          OPS_MEMORY_DATABASE_URL: postgresql://operations_memory:password@localhost:5432/operations_memory_test
          OPS_MEMORY_STORAGE_PROFILE: vchord
          OPS_MEMORY_EMBEDDINGS_OPENAI_MODEL: qwen/qwen3-embedding-4b
