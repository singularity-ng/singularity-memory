name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ghcr.io/tensorchord/vchord-suite:pg18-latest
        env:
          POSTGRES_USER: singularity_memory
          POSTGRES_PASSWORD: password
          POSTGRES_DB: singularity_memory_test
        options: >-
          --health-cmd "pg_isready -U singularity_memory -d singularity_memory_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Go build
        run: cd go && go build ./...
      - name: Go test
        run: cd go && go test ./...
        env:
          SINGULARITY_DATABASE_URL: postgresql://singularity_memory:password@localhost:5432/singularity_memory_test
          SINGULARITY_STORAGE_PROFILE: vchord
          SINGULARITY_EMBEDDINGS_OPENAI_MODEL: qwen/qwen3-embedding-4b
